name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: streamlitexample-495201
  SERVICE: cannon-chaos
  REGION: us-central1
  IMAGE: us-central1-docker.pkg.dev/streamlitexample-495201/cloud-run-source-deploy/cannon-chaos

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Google Auth
      id: auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker
      run: |
        gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

    - name: Build and Push Container
      run: |
        docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest .
        docker push ${{ env.IMAGE }}:${{ github.sha }}
        docker push ${{ env.IMAGE }}:latest

    - name: Deploy to Cloud Run
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: ${{ env.SERVICE }}
        region: ${{ env.REGION }}
        image: ${{ env.IMAGE }}:${{ github.sha }}
